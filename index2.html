<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Onishi Gallery</title>

    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="icon" type="image/png" href="/assets/icon_logo.png">

    <script src="libraries/p5.min.js"></script>
    <script src="libraries/p5.sound.min.js"></script>
  </head>

  <body>
    <div class="title">
      <a href="https://www.onishigallery.com/" class="title">
        <img src="assets/onishi_gallery_logo.png" alt="Onishi Gallery Logo" class="logo">
      </a>
    </div>
    <div class="message">
      <p>*Please inquire for prices</p>
    </div>
    <div class="info">
      <img class="photo">
      <p class="artist"></p>
      <p class="name"></p>
      <p class="material"></p>
      <p class="size"></p>
      <p class="availability"></p>
      <a class="button"></a>
    </div>
    <script src="sketch2.js"></script>
  </body>
</html>

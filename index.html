<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sketch</title>

    <link rel="stylesheet" type="text/css" href="style.css">

    <script src="libraries/p5.min.js"></script>
    <script src="libraries/p5.sound.min.js"></script>
  </head>

  <body>
    <div class="title">
      <a href="https://www.onishigallery.com/" class="title">
        <img src="assets/onishi_gallery_logo.png" alt="Onishi Gallery Logo" class="logo">
      </a>
    </div>
    <div class="message">
      <p>*Please inquire for prices</p>
    </div>
    <div class="info">
      <img class="photo">
      <p class="artist">Artist</p>
      <p class="name">Name</p>
      <p class="material">Material</p>
      <p class="size">Size</p>
      <p class="availability">Available</p>
      <a class="button">Inquire</a>
    </div>
    <script src="sketch.js"></script>
  </body>
</html>
